<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – MediBook</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#e8f2fc] flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
      <a href="index.html" class="self-start mb-4 text-[#1977cc] hover:underline font-medium inline-flex items-center gap-1 text-sm">
        <span aria-hidden="true">←</span> Home
      </a>
      <h1 class="text-2xl font-bold text-slate-800 text-center mb-2">MediBook</h1>
      <p class="text-slate-500 text-center text-sm mb-6">Sign in to continue</p>

      <form id="loginForm" class="space-y-4" action="javascript:void(0)" method="get" onsubmit="return false;">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Login as</label>
          <div class="flex gap-4">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="role" value="doctor" class="rounded border-slate-300 text-[#1977cc]">
              <span>Doctor</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="role" value="patient" class="rounded border-slate-300 text-[#1977cc]" checked>
              <span>Patient</span>
            </label>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input type="email" name="email" required
            class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#1977cc] focus:border-transparent"
            placeholder="you@example.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input type="password" name="password" required
            class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#1977cc] focus:border-transparent"
            placeholder="••••••••">
        </div>
        <button type="submit" class="w-full py-3 bg-[#1977cc] text-white font-medium rounded-lg hover:opacity-90 transition">
          Login
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 mt-6">
        Don't have an account? <a href="signup.html" class="text-[#1977cc] font-medium hover:underline">Sign up</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', handleLogin);
  </script>
</body>
</html>
