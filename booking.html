<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment – MediBook</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#e8f2fc]">
  <header class="bg-white shadow-md border-b border-slate-100">
    <div class="max-w-2xl mx-auto px-4 py-3 flex justify-between items-center">
      <a href="patient-dashboard.html" class="text-[#1977cc] hover:underline font-medium">← Back to doctors</a>
      <a href="index.html" onclick="clearSession()" class="text-red-600 hover:underline text-sm">Logout</a>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-xl font-bold text-slate-800 mb-4">Book Appointment</h1>
    <div class="mb-4">
      <label class="block text-sm font-medium text-slate-700 mb-1">Date</label>
      <input type="date" id="bookingDate" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#1977cc]" readonly>
    </div>
    <div id="slotSection" class="bg-white rounded-xl shadow p-6 mb-4 border border-slate-100"></div>
    <div id="bookingResult" class="hidden"></div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/patient.js"></script>
  <script>
    requireAuth(['patient']);
    initBookingPage();
  </script>
</body>
</html>
