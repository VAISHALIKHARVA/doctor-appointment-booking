<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – MediBook</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#e8f2fc] flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
      <a href="index.html" class="self-start mb-4 text-[#1977cc] hover:underline font-medium inline-flex items-center gap-1 text-sm">
        <span aria-hidden="true">←</span> Home
      </a>
      <h1 class="text-2xl font-bold text-slate-800 text-center mb-2">Create Account</h1>
      <p class="text-slate-500 text-center text-sm mb-6">Sign up as Doctor or Patient</p>

      <form id="signupForm" class="space-y-4" method="post" action="#">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">I am a</label>
          <div class="flex gap-4">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="role" value="doctor" class="rounded border-slate-300 text-[#1977cc]" id="roleDoctor" required>
              <span>Doctor</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="role" value="patient" class="rounded border-slate-300 text-[#1977cc]" id="rolePatient" checked>
              <span>Patient</span>
            </label>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Name</label>
          <input type="text" name="name" id="signupName" required minlength="2" maxlength="80"
            title="Name: 2–80 characters"
            class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#1977cc] focus:border-transparent"
            placeholder="Full name" autocomplete="name">
        </div>

        <div id="doctorSpecialist" class="hidden">
          <label class="block text-sm font-medium text-slate-700 mb-1">Specialist</label>
          <input type="text" name="specialist" id="signupSpecialist" minlength="2" maxlength="80"
            title="Specialist: 2–80 characters (required for doctors)"
            class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#1977cc] focus:border-transparent"
            placeholder="e.g. Cardiologist" autocomplete="organization-title">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input type="email" name="email" id="signupEmail" required maxlength="254"
            pattern="[^\s@]+@[^\s@]+\.[^\s@]{2,}"
            title="Enter a valid email, e.g. you@example.com"
            class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#1977cc] focus:border-transparent"
            placeholder="you@example.com" autocomplete="email">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Phone</label>
          <input type="tel" name="phone" id="signupPhone" required
            inputmode="numeric" autocomplete="tel" maxlength="10" minlength="10"
            pattern="[0-9]{10}"
            title="Exactly 10 digits (numbers only)"
            class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#1977cc] focus:border-transparent"
            placeholder="10-digit number">
        </div>
        <div class="relative">
          <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input type="password" name="password" required id="signupPassword" minlength="6" maxlength="128"
            title="Password: 6–128 characters"
            class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#1977cc] focus:border-transparent"
            placeholder="••••••••" autocomplete="new-password">
          <button type="button" id="togglePassword" class="absolute right-3 top-9 text-slate-400 hover:text-slate-600" aria-label="Toggle password">
            <svg class="w-5 h-5 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            <svg class="w-5 h-5 eye-closed hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
          </button>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Confirm Password</label>
          <input type="password" name="confirmPassword" required id="signupConfirmPassword" minlength="6" maxlength="128"
            title="Must match password (6–128 characters)"
            class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#1977cc] focus:border-transparent"
            placeholder="••••••••" autocomplete="new-password">
        </div>
        <button type="submit" class="w-full py-3 bg-[#1977cc] text-white font-medium rounded-lg hover:opacity-90 transition">
          Sign Up
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 mt-6">
        Already have an account? <a href="login.html" class="text-[#1977cc] font-medium hover:underline">Login</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function syncSignupSpecialistRequired() {
      var spec = document.getElementById('signupSpecialist');
      var doc = document.getElementById('roleDoctor');
      if (spec) spec.required = !!(doc && doc.checked);
    }
    document.getElementById('signupForm').addEventListener('submit', function (e) {
      e.preventDefault();
      syncSignupSpecialistRequired();
      if (!this.reportValidity()) return;
      handleSignup(e);
    });
    (function () {
      var phone = document.getElementById('signupPhone');
      if (!phone) return;
      phone.addEventListener('input', function () {
        var digits = phone.value.replace(/\D/g, '').slice(0, 10);
        if (phone.value !== digits) phone.value = digits;
      });
    })();
    (function syncConfirmPasswordValidity() {
      var pw = document.getElementById('signupPassword');
      var c = document.getElementById('signupConfirmPassword');
      if (!pw || !c) return;
      function run() {
        if (!c.value) {
          c.setCustomValidity('');
          return;
        }
        c.setCustomValidity(c.value !== pw.value ? 'Passwords do not match' : '');
      }
      pw.addEventListener('input', run);
      c.addEventListener('input', run);
    })();
    document.querySelectorAll('[name="role"]').forEach(function (r) {
      r.addEventListener('change', function () {
        var specialist = document.getElementById('doctorSpecialist');
        specialist.classList.toggle('hidden', this.value !== 'doctor');
        syncSignupSpecialistRequired();
      });
    });
    document.getElementById('rolePatient').dispatchEvent(new Event('change'));
    syncSignupSpecialistRequired();
    document.getElementById('togglePassword').addEventListener('click', function () {
      var pw = document.getElementById('signupPassword');
      var open = document.querySelector('.eye-open');
      var closed = document.querySelector('.eye-closed');
      if (pw.type === 'password') {
        pw.type = 'text';
        open.classList.add('hidden');
        closed.classList.remove('hidden');
      } else {
        pw.type = 'password';
        open.classList.remove('hidden');
        closed.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
